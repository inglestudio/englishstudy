<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Adjectives</title>
<style>
  body {
  font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
  background: #ffffff;
  margin: 0;
  padding: 40px 20px;
  display: flex;
  justify-content: center;
}

.container {
  max-width: 600px;
  width: 100%;
  text-align: center;
}

h1 {
  font-size: 2rem;
  margin-bottom: 25px;
  color: #2d3748;
}

h2 {
  font-size: 1rem;
  margin-bottom: 15px;
  color: #2d3748;
}

.card {
  position: relative;
  background: white;
  border-radius: 20px;
  padding: 0;
 
  font-size: 2rem;
  box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
  margin-bottom: 30px;
  cursor: pointer;
  
  transition: transform 0.7s cubic-bezier(.22,.61,.36,1);
  transform-style: preserve-3d;
}

.card.card-be {
  background: linear-gradient(180deg,#fff7ed,#fffbeb);
  border: 3px solid #f59e0b;
}
.card.card-regular {
  background: linear-gradient(180deg,#ecfdf5,#f7fef9);
  border: 2px solid #16a34a;
}
.card.card-irregular {
  background: linear-gradient(180deg,#eff6ff,#f8fbff);
  border: 2px solid #2563eb;
}


.face {
  backface-visibility: hidden;
  transition: transform 0.7s cubic-bezier(.22,.61,.36,1);
  padding: 60px 30px;
  box-sizing: border-box;
  box-sizing: border-box;
  padding: 20px;
  overflow-y: auto;
  display:flex;
  flex-direction:column;
  
}

.front {
  transform: rotateY(0deg);
}

.back {
  position: absolute;
  inset: 0;
  transform: rotateY(180deg);
}

.card.is-flipped .front {
  transform: rotateY(180deg);
}

.card.is-flipped .back {
  transform: rotateY(0deg);
}


.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 20px 50px rgba(0, 0, 0, 0.12);
}

button {
  background: white;
  border: 2px solid #dbe3f0;
  border-radius: 14px;
  padding: 12px 20px;
  margin: 6px;
  font-size: 1.1rem;
  cursor: pointer;
  transition: all 0.2s ease;
}

button:hover {
  background: #edf2f7;
}

button.active {
  background: #4f46e5;
  color: white;
  border-color: #4f46e5;
  box-shadow: 0 8px 20px rgba(79, 70, 229, 0.25);
}

.label-regular {
  color: #66ff00;
  font-weight: 600;
}

.label-irregular {
  color: #dc2626;
  font-weight: 600;
}

.app {
  max-width: 720px;
  width: 100%;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 25px;
}

.sub {
  color: #6b7280;
  margin-top: 4px;
}

.badge {
  background: #4f46e5;
  color: white;
  padding: 6px 12px;
  border-radius: 999px;
  font-weight: 600;
  font-size: 0.9rem;
}

.card-wrap {
  perspective: 1200px;
}

.label{
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 6px;
  margin-bottom: 2px;
  color: #666;
}

.verb-type {
  font-size: 0.85rem;
  font-weight: 600;
  color: #6b7280;
  margin-bottom: 10px;
}

.word {
  font-size: 2.6rem;
   margin: 0;
 
  color: #111827;
}

.back .word{
  font-size: 2rem;
  margin: 0;
  
}


.example{
  font-size: 1.2rem;
  line-height: 0;
 
}

.back .word{
  margin: 0;
  line-height: 1;
}

.back .example{
  margin: 0;
  line-height: 0;
}

.back .label{
  margin: 4px 0 0 0;
}

.hint {
  font-size: 0.8rem;
  margin-top: 20px;
  color: #9ca3af;
}

.controls {
  margin-top: 20px;
}

.btns {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 10px;
  margin: 10px 0;
}

.primary {
  background: #4f46e5;
  color: white;
  border-color: #4f46e5;
}

.primary:hover {
  background: #4338ca;
}

.progress {
  margin-top: 10px;
  color: #6b7280;
  font-size: 0.9rem;
}

.card.regular { background: #d1fae5; }   /* soft green */
.card.irregular { background: #B0E0E6; } 
.card-be .verb-type {
  color: #d97706;
  font-weight: 700;
}

#modeBtn {
    block: hidden;
}

.card-special{
  border:3px solid #c8a000;
  background:#fff7cc;
}

.card-short{
  border:3px solid #1f7a3a;
  background:#e9f7ee;
}

.card-long{
  border:3px solid #1f4fa3;
  background:#e8f0ff;
}

.card-y{
  border:3px solid #7a3ab2;
  background:#f3e8ff;
}

#comparativeWord {
    margin: 0;
    line-height: 0;
}

</style>
</head>

<body>
  <div class="app">
    <header>
      <div>
        <h1>Adjectives</h1>
        <p class="sub">ESOL 2 practice • Click or tap the card to flip.</p>
      </div>
      <span class="badge" id="counter">1 / 12</span>
    </header>
    
    <!--<div id="verb-type-controls">
        <button id="irregularBtn" onclick="setVerbType('irregular')">Irregular</button>
<button id="regularBtn" onclick="setVerbType('regular')">Regular</button>
<button id="mixedBtn" onclick="setVerbType('mixed')">Mixed</button>
    </div>-->

    <div class="card-wrap">
      <div class="card" id="card" tabindex="0">
        <!-- FRONT -->
        <section class="face front">
          <div class="label">Adjective</div>
          
          <h2 class="word"><b id="frontWord">good</b><button onclick="speakText('frontWord', event)" title="Listen">🔊</button></h2>

        <p class="example"><span id="frontExample">I feel good today.</span><button onclick="speakText('frontExample', event)" title="Listen">🔊</button></p>
        
          <div class="hint">Click to flip • <kbd>Space</kbd> • <kbd>→</kbd>/<kbd>←</kbd></div>
        </section>

        <!-- BACK -->
        <section class="face back">

        <div class="label">Comparative</div>
        <h2 class="word"><b id="comparativeWord">Better</b><button onclick="speakText('comparativeWord', event)" title="Listen">🔊</button></h2>
        <p class="example"><span id="compExample">I feel better today.</span><button onclick="speakText('compExample', event)">🔊</button></p>

        <div class="label">Superlative</div>
        <h2 class="word"><b id="superlativeWord">Best</b><button onclick="speakText('superlativeWord', event)">🔊</button></h2>
        <p class="example"><span id="supExample">I feel better today.</span><button onclick="speakText('supExample', event)">🔊</button></p>

        </section>
      </div>
    </div>
    
<div id="quiz" style="display:none;">
    
  <p><strong>Choose the past form:</strong></p>
  <p class="progress" id="quizCounter">Question 1 / 12</p>
  <div id="progress"></div>
  <p id="quizPrompt"></p>

  <div id="choices"></div>

  <p id="feedback" style="margin-top:10px;"></p> -->

  <!-- QUIZ CONTROLS -->
  <div class="btns" style="margin-top:16px;">
    <button id="quizPrev">← Previous</button>
    <button id="quizNext">Next →</button>
  </div>
</div>


    <div class="controls">
      <div class="btns" id="cardControls">
        <button id="prev">← Previous</button>
        <button class="primary" id="flip">Flip</button>
        <button id="next">Next →</button>
      </div>
      <!--<div class="btns">
          <button id="modeBtn">Quiz Mode</button>
      </div>-->
      <div class="btns">
        <button id="shuffle">Shuffle</button>
        <button id="reset">Reset</button>
      </div>
      <div class="progress">
        Keys: <kbd>←</kbd> <kbd>→</kbd> <kbd>Space</kbd>
      </div>
    </div>
  </div>


<script>

// DATASET

const adjectives = [

{ base:"good", comparative:"better", superlative:"the best",
frontExample: "Olive Garden is a good restaurant.",
compExample:"Olive Garden is better than McDonald's.",
supExample:"Olive Garden is the best restaurant.", type:"special" },

{ base:"bad", comparative:"worse", superlative:"the worst",
frontExample: "Today is a bad day.",
compExample:"Today is worse than yesterday.",
supExample:"Monday is the worst day of the week.", type:"special" },

{ base:"big", comparative:"bigger", superlative:"the biggest",
frontExample: "Boston is a big city.",
compExample:"Boston is bigger than Revere.",
supExample:"Boston is the biggest city in Massachusetts.", type:"short" },

{ base:"small", comparative:"smaller", superlative:"the smallest",
frontExample: "Our kitchen is small.",
compExample:"The bedroom is smaller than the kitchen.",
supExample:"The bedroom is the smallest room in the house.", type:"short" },

{ base:"young", comparative:"younger", superlative:"the youngest",
frontExample: "My brother is young.",
compExample:"My brother is younger than me.",
supExample:"He is the youngest person in our family.", type:"short" },

{ base:"old", comparative:"older", superlative:"the oldest",
frontExample: "My father is very old.",
compExample:"My father is older than my mother.",
supExample:"He is the oldest person here.", type:"short"},

{ base:"warm", comparative:"warmer", superlative:"the warmest",
frontExample: "It's warm today.",
compExample:"Today is warmer than yesterday.",
supExample:"July is the warmest month.", type:"short" },

{ base:"cold", comparative:"colder", superlative:"the coldest",
frontExample: "It's cold today.",
compExample:"Today is colder than yesterday.",
supExample:"January is the coldest month.", type:"short" },

{ base:"hot", comparative:"hotter", superlative:"the hottest",
frontExample: "It's hot today.",
compExample:"Today is hotter than yesterday.",
supExample:"August is the hottest month.", type:"short" },

{ base:"tall", comparative:"taller", superlative:"the tallest",
frontExample: "John is tall.",
compExample:"John is taller than Mike.",
supExample:"John is the tallest player on the team.", type:"short" },

{ base:"short", comparative:"shorter", superlative:"the shortest",
frontExample: "James is short.",
compExample:"James is shorter than Maria.",
supExample:"He is the shortest person in the class.", type:"short" },

{ base:"cheap", comparative:"cheaper", superlative:"the cheapest",
frontExample: "Market Basket is cheap.",
compExample:"Market Basket is cheaper than Shaw's.",
supExample:"It's the cheapest supermarket.", type:"short" },

{ base:"expensive", comparative:"more expensive", superlative:"the most expensive",
frontExample: "Boston is an expensive city.",
compExample:"It's more expensive than Bogota.",
supExample:"New York is the most expensive city.", type:"long" },

{ base:"easy", comparative:"easier", superlative:"the easiest",
frontExample: "English is easy!",
compExample:"English is easier than Spanish.",
supExample:"English is the easiest language.", type:"y" }

];


// STATE

let cards = [...adjectives];
let index = 0;


// ELEMENTS

const card = document.getElementById("card");
const counter = document.getElementById("counter");


// RENDER

function render(){

const c = cards[index];

document.getElementById("frontWord").textContent = c.base;

document.getElementById("comparativeWord").textContent = c.comparative;
document.getElementById("superlativeWord").textContent = c.superlative;

document.getElementById("compExample").textContent = c.compExample;
document.getElementById("supExample").textContent = c.supExample;
document.getElementById("frontExample").textContent = c.frontExample || "";


// special color (good/bad)

card.classList.remove("card-special");

if(c.type === "special"){
card.classList.add("card-special");
}

card.classList.remove(
  "card-special",
  "card-short",
  "card-long",
  "card-y"
);

if(c.type==="special") card.classList.add("card-special");
if(c.type==="short") card.classList.add("card-short");
if(c.type==="long") card.classList.add("card-long");
if(c.type==="y") card.classList.add("card-y");

// counter

counter.textContent = `${index+1} / ${cards.length}`;


// reset flip

card.classList.remove("is-flipped");

}


// CONTROLS

function flip(){
card.classList.toggle("is-flipped");
}

function next(){
index = (index+1) % cards.length;
render();
}

function prev(){
index = (index-1+cards.length) % cards.length;
render();
}

function shuffle(){
cards.sort(()=>Math.random()-0.5);
index=0;
render();
}

function reset(){
cards=[...adjectives];
index=0;
render();
}


// SPEECH

function speak(text,event){
if(event) event.stopPropagation();

if(!window.speechSynthesis) return;

const utter = new SpeechSynthesisUtterance(text);
utter.lang="en-US";
utter.rate=0.9;

speechSynthesis.cancel();
speechSynthesis.speak(utter);
}

function speakText(id,event){
if(event) event.stopPropagation();

const el=document.getElementById(id);
if(!el) return;

speak(el.textContent.trim());
}


// BUTTON EVENTS

document.getElementById("flip").onclick=flip;
document.getElementById("next").onclick=next;
document.getElementById("prev").onclick=prev;
document.getElementById("shuffle").onclick=shuffle;
document.getElementById("reset").onclick=reset;

card.onclick=flip;


// KEYBOARD CONTROLS

document.addEventListener("keydown",e=>{

if(e.key==="ArrowRight") next();

if(e.key==="ArrowLeft") prev();

if(e.key===" "){
e.preventDefault();
flip();
}

});


// INITIAL RENDER

render();


</script>
</body>
</html>
